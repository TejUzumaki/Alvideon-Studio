<!DOCTYPE html>
<html>
<head>
  <title>Contact Test</title>
</head>
<body>

  <h2>Contact Form</h2>

  <form id="contactForm">
    <input type="text" id="name" placeholder="Your Name" required><br><br>
    <input type="email" id="email" placeholder="Your Email" required><br><br>
    <textarea id="message" placeholder="Your Message" required></textarea><br><br>
    <button type="submit">Send</button>
  </form>

  <p id="status"></p>

  <script>
    document.getElementById("contactForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const message = document.getElementById("message").value;

      const res = await fetch("http://127.0.0.1:5000/send", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, email, message })
      });

      const data = await res.json();

      if (data.success) {
        document.getElementById("status").innerText = "Message Sent ✅";
      } else {
        document.getElementById("status").innerText = "Error ❌";
      }
    });
  </script>

</body>
</html>
